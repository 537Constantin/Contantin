<!DOCTYPE html>
<html lang="de">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penis</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f1ea;
      font-family: system-ui, sans-serif;
    }
    svg {
      width: min(60vw, 300px);
      height: auto;
    }
  </style>
</head>
<body>
  <!-- Schlichte, cartoonhafte Strichzeichnung -->

    <g fill="#f0c9a8" stroke="#3a2b22" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <!-- Schaft -->
      <rect x="78" y="60" width="44" height="180" rx="22" />
      <!-- Eichel -->
      <circle cx="100" cy="55" r="30" />
      <!-- Hoden -->
      <ellipse cx="72" cy="255" rx="34" ry="42" />
      <ellipse cx="128" cy="255" rx="34" ry="42" />
    </g>
  </svg>
</body>
</html>
