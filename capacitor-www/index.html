<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SmartStaff</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: radial-gradient(120% 88% at 50% 30%, #18203a 0%, #0a0e1a 58%, #070a12 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #f7f8fb;
      }
      .wrap {
        display: grid;
        place-items: center;
        height: 100%;
        text-align: center;
        padding: 24px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #5b8cf0;
        animation: pulse 1.2s ease-in-out infinite;
        margin: 0 auto 16px;
      }
      @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
      p { color: #8a93ad; font-size: 14px; }
    </style>
  </head>
  <body>
    <!--
      Fallback web root for the native shell. In normal operation the app loads
      the live deployment via server.url (see capacitor.config.ts); this screen
      only shows briefly or if the device is offline.
    -->
    <div class="wrap">
      <div>
        <div class="dot"></div>
        <p>SmartStaff wird geladen …</p>
      </div>
    </div>
  </body>
</html>
